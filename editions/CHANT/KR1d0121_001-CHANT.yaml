body:
  text: 周氏喪服注禮己雖小功可以冠娶妻則女身雖有服謂出門無嫌也杜佑通典卷六十何承天引或問曰斬縗終三年乎答曰不也卒哭而服齎縗又問若不終三年則服卒何故云髽三年又云三年之喪若斬則是居情理之極所謂致喪者也焉得卒哭而奪情答曰但尋名教者宜求其本本正則條目自明聖王雖總企及俯就以為之制要以滅性為深憂是以節哀順變每受以輕也通典卷八十七孟氏問曰嗣子今為孟使君持重光祿喪庭便無服主位於禮云何續之答禮無曉然之文然意謂嗣子宜兼持重正位之喪豈又闕三年正主耶又問曰若嗣子兼持重者光祿喪次親有廬耶答曰禮之倚廬在東牆下蓋是寢苫枕凷之處非接賓位也謂寢息之所宜在親之殯宮於光祿喪庭若賓客饋奠凡有是事然後之喪所己則還廬次然今代皆以廬為接賓之位位則二處從禮之變亦宜兩設耶又問葬奠之禮何先何後答曰禮云父母之喪偕其葬也先輕而後重其虞也先重而後輕其葬服斬縗以例而推光祿葬及奠虞皆宜先於情則祖輕於尊則義重通典卷九十七
